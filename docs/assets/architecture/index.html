<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tsuzuri local-first media pipeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --parchment: #f5f4ed;
    --ivory: #faf9f5;
    --near-black: #141413;
    --olive: #504e49;
    --stone: #6b6a64;
    --brand: #1B365D;
    --brand-tint: #EEF2F7;
    --store: #EAE9E2;
    --external: #E9E8E1;
    --border: #DEDED7;
    --serif: Charter, Georgia, Palatino, "Times New Roman", serif;
    --mono: "JetBrains Mono", "SF Mono", Consolas, Monaco, monospace;
  }
  html, body { width: 100%; min-height: 100%; background: var(--parchment); }
  body { display: grid; place-items: center; overflow: auto; }
  .diagram { width: 1200px; height: 680px; background: var(--parchment); }
  svg { display: block; width: 1200px; height: 680px; }
</style>
</head>
<body>
  <main class="diagram">
    <svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc">
      <title id="diagram-title">tsuzuri local-first media pipeline</title>
      <desc id="diagram-desc">Optional yt-dlp and LRCLIB preparation writes audio and lyrics into a media folder. The tsuzuri CLI then runs local analysis, timeline planning, video rendering, and still rendering to produce MP4 and PNG outputs.</desc>
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="#E3E2DC"/>
        </pattern>
      </defs>

      <rect width="1200" height="680" fill="#f5f4ed"/>
      <rect width="1200" height="680" fill="url(#dots)" opacity="0.55"/>

      <text x="40" y="52" fill="#1B365D" font-size="26" font-weight="500" font-family="Charter, Georgia, serif" letter-spacing="6">TSUZURI · LOCAL-FIRST MEDIA PIPELINE</text>
      <text x="40" y="80" fill="#6b6a64" font-size="13" font-family="JetBrains Mono, SF Mono, Consolas, monospace" letter-spacing="1.6">optional online preparation · local deterministic core · video + still</text>
      <line x1="40" y1="100" x2="1160" y2="100" stroke="#1B365D" stroke-width="1.2"/>

      <text x="40" y="124" fill="#6b6a64" font-size="11" font-family="JetBrains Mono, SF Mono, Consolas, monospace" letter-spacing="2.2">OPTIONAL ONLINE PREP</text>
      <text x="424" y="124" fill="#1B365D" font-size="11" font-family="JetBrains Mono, SF Mono, Consolas, monospace" letter-spacing="2.2">LOCAL DETERMINISTIC CORE</text>
      <line x1="408" y1="116" x2="408" y2="556" stroke="#B2B1AC" stroke-width="1" stroke-dasharray="6 6"/>

      <text x="1080" y="188" fill="#504e49" font-size="11" font-family="JetBrains Mono, SF Mono, Consolas, monospace" text-anchor="middle">beat-snap · editable</text>
