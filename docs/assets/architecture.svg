  <text x="148" y="32" fill="#504e49" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="3">PHOTOS + SONG &#8594; BEAT-SYNCED DIARY FILM</text>
  <line x1="40" y1="44" x2="680" y2="44" stroke="#1B365D" stroke-width="0.8"/>

  <!-- Row 1 arrows -->
  <line x1="184" y1="108" x2="270" y2="108" stroke="#504e49" stroke-width="1.2"/>
  <path d="M264 103 L271 108 L264 113" fill="none" stroke="#504e49" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="416" y1="108" x2="502" y2="108" stroke="#504e49" stroke-width="1.2"/>
  <path d="M496 103 L503 108 L496 113" fill="none" stroke="#504e49" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 1 arrow labels (above the lines) -->
  <text x="228" y="100" fill="#504e49" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" letter-spacing="0.1em">SCAN</text>
  <text x="460" y="88" fill="#504e49" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" letter-spacing="0.08em">beats.json</text>
  <text x="460" y="100" fill="#504e49" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" letter-spacing="0.08em">lyrics.json</text>

  <!-- Elbow: Plan ↓ → timeline.json -->
  <path d="M576 140 L576 196 L120 196 L120 236" fill="none" stroke="#504e49" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M115 230 L120 237 L125 230" fill="none" stroke="#504e49" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2 arrows -->
  <line x1="200" y1="276" x2="286" y2="276" stroke="#504e49" stroke-width="1.2"/>
  <path d="M280 271 L287 276 L280 281" fill="none" stroke="#504e49" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="432" y1="276" x2="518" y2="276" stroke="#504e49" stroke-width="1.2"/>
  <path d="M512 271 L519 276 L512 281" fill="none" stroke="#504e49" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2 arrow labels (above the lines) -->
  <text x="244" y="268" fill="#504e49" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" letter-spacing="0.1em">PROPS</text>
  <text x="476" y="268" fill="#504e49" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" letter-spacing="0.05em">&#8722;14 LUFS</text>

