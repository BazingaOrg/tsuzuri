  <text x="344" y="114" fill="#141413" font-size="12" font-weight="500" font-family="Georgia, serif" text-anchor="middle">Analyze</text>
  <text x="344" y="130" fill="#504e49" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">librosa &#183; whisper</text>

