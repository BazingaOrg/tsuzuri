  <text x="526" y="94" fill="#141413" font-size="7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.15em">STAGE 2 &#183; PYTHON</text>
  <text x="576" y="114" fill="#141413" font-size="12" font-weight="500" font-family="Georgia, serif" text-anchor="middle">Plan</text>
  <text x="576" y="130" fill="#504e49" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">beat-snap alloc</text>

