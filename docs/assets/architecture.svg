  <rect x="520" y="244" width="160" height="64" rx="6" fill="#EAE9E2" stroke="#504e49" stroke-width="1"/>
  <text x="542" y="262" fill="#504e49" font-size="7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.15em">OUTPUT</text>
  <text x="600" y="282" fill="#141413" font-size="12" font-weight="500" font-family="Georgia, serif" text-anchor="middle">&#8249;folder&#8250;.mp4</text>
  <text x="600" y="298" fill="#504e49" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">H.264 &#183; AAC</text>
