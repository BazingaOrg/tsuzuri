  <text x="120" y="282" fill="#141413" font-size="12" font-weight="500" font-family="Georgia, serif" text-anchor="middle">timeline.json</text>
  <text x="120" y="298" fill="#504e49" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">hand-editable</text>

